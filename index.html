<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash AI | Autonomous Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
        <div class="space-container" id="space-backdrop">
            <div class="moving-layer starfield"></div>
            <!-- Floating icons will be injected here by JS -->
        </div>
        <div class="auth-container">
            <h1 class="minimal-logo">Dash</h1>
            <p class="subtitle">The Autonomous Intelligence Layer</p>
            
            <div class="social-btns">
                <div class="social-btn">
                    <i class="fa-brands fa-google"></i>
                    Continue with Google
                </div>
                <div class="social-btn apple">
                    <i class="fa-brands fa-apple"></i>
                    Continue with Apple
                </div>
            </div>

            <div class="divider">or</div>

            <div class="auth-form">
                <input type="text" class="auth-input" placeholder="Email or Phone number">
                <button id="continue-btn" class="primary-btn">Continue</button>
            </div>
        </div>
    </div>

    <!-- Main Screen (Hidden initially) -->
    <div id="main-screen" class="screen" style="display: none;">
        <div class="top-nav">
            <div class="logo-small">Dash</div>
            <div class="user-profile">JD</div>
        </div>

        <div class="command-container">
            <div class="hero-text">What's the mission?</div>
            
            <div class="thread-wrapper" id="message-thread">
                <!-- Messages will appear here -->
            </div>

            <div class="input-wrapper">
                <textarea id="command-input" placeholder="Find me the cheapest flight to Tokyo..." rows="1"></textarea>
                <button id="execute-btn" class="execute-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12L2.01 3L2 10l15 2l-15 2z"/></svg>
                </button>
            </div>

            <div class="status-indicator" id="status-area" style="display: none;">
                <div class="spinner"></div>
                <span id="status-text">Reasoning...</span>
            </div>

            <div class="quick-actions">
                <button class="action-chip">✈️ Book Travel</button>
                <button class="action-chip">🎁 Ship Gift</button>
                <button class="action-chip">🛠️ Provision Dev Env</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
