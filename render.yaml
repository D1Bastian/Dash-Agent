services:
  - type: web
    name: dash-agent
    env: python
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DASH_MCP_MODE
        value: live
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Your Gemini API Key from Google AI Studio"
      - key: MONGO_URI
        sync: false
        placeholder: "mongodb+srv://..."
      - key: ELASTIC_CLOUD_ID
        sync: false
        placeholder: "Your Elastic Cloud ID"
      - key: ELASTIC_API_KEY
        sync: false
        placeholder: "Your Elastic API Key"
      - key: ARIZE_API_KEY
        sync: false
        placeholder: "Your Arize API Key"
      - key: ARIZE_SPACE_ID
        sync: false
        placeholder: "Your Arize Space ID"
      - key: FIVETRAN_API_KEY
        sync: false
      - key: FIVETRAN_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
        placeholder: "Your Google OAuth Client ID"
      - key: GOOGLE_CLIENT_SECRET
        sync: false
        placeholder: "Your Google OAuth Client Secret"
      - key: GOOGLE_REDIRECT_URI
        sync: false
        placeholder: "https://your-render-url.onrender.com/auth/google/callback"
      - key: FRONTEND_URL
        sync: false
        placeholder: "https://your-render-url.onrender.com"
      - key: PYTHON_VERSION
        value: 3.12.3


